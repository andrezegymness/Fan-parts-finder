<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Parts Lookup — Modern Forms &amp; WAC Lighting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0e12;
  --surface: #15181f;
  --surface-hover: #1c2029;
  --border: #2a2e38;
  --text: #e8eaed;
  --text-dim: #8b8f9a;
  --accent: #4ecdc4;
  --accent-glow: rgba(78, 205, 196, 0.15);
  --accent-dim: #3ba89f;
  --orange: #ff6b35;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 60px 0 40px;
  text-align: center;
}

header .brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

header .brand svg {
  width: 36px;
  height: 36px;
}

header .brand-text {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 600;
  line-height: 1.1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--text-dim);
  font-size: 16px;
  font-weight: 300;
}

header .stat-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
}

header .stat {
  text-align: center;
}

header .stat .num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

header .stat .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* SEARCH */
.search-wrap {
  position: relative;
  max-width: 600px;
  margin: 0 auto 16px;
}

.search-wrap svg {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  color: var(--text-dim);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 18px 20px 18px 52px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search::placeholder { color: var(--text-dim); }

#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.search-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 40px;
}

.search-hint kbd {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
}

/* RESULTS */
#results {
  padding-bottom: 80px;
}

.fan-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  animation: fadeUp 0.35s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fan-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}

.fan-header:hover { background: var(--surface-hover); }

.fan-header-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.fan-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
}

.fan-model-nums {
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.fan-header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.parts-badge {
  background: var(--accent-glow);
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.chevron {
  width: 20px;
  height: 20px;
  color: var(--text-dim);
  transition: transform 0.25s ease;
}

.fan-card.open .chevron { transform: rotate(180deg); }

.fan-body {
  display: none;
  border-top: 1px solid var(--border);
}

.fan-card.open .fan-body { display: block; }

.product-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  transition: color 0.15s;
}

.product-link:hover { color: var(--orange); }

.parts-table {
  width: 100%;
  border-collapse: collapse;
}

.parts-table th {
  text-align: left;
  padding: 10px 24px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  background: rgba(0,0,0,0.2);
  font-weight: 500;
}

.parts-table td {
  padding: 12px 24px;
  font-size: 14px;
  border-top: 1px solid var(--border);
}

.parts-table tr:hover td { background: var(--surface-hover); }

.part-name { font-weight: 500; }

.part-number {
  font-family: 'DM Sans', monospace;
  color: var(--orange);
  font-size: 13px;
  font-weight: 500;
}

.no-pn { color: var(--text-dim); font-style: italic; font-size: 12px; }

.edit-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-dim);
  padding: 4px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  vertical-align: middle;
  margin-left: 6px;
}

.parts-table tr:hover .edit-btn { opacity: 1; }
.edit-btn:hover { color: var(--accent); background: var(--accent-glow); }

.edit-input {
  background: var(--bg);
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', monospace;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 8px;
  width: 140px;
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.edit-actions {
  display: inline-flex;
  gap: 4px;
  margin-left: 6px;
  vertical-align: middle;
}

.edit-save, .edit-cancel {
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 8px;
  transition: opacity 0.15s;
}

.edit-save { background: var(--accent); color: #0c0e12; }
.edit-cancel { background: var(--border); color: var(--text-dim); }
.edit-save:hover, .edit-cancel:hover { opacity: 0.8; }

/* ADD PART ROW */
.add-part-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  margin: 8px 24px 12px;
  padding: 7px 14px;
  transition: border-color 0.15s, color 0.15s;
  width: calc(100% - 48px);
  justify-content: center;
}
.add-part-btn:hover { border-color: var(--accent); color: var(--accent); }

.add-part-row td { padding: 10px 24px; border-top: 1px solid var(--border); background: rgba(78,205,196,0.03); }
.add-part-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.add-part-inputs input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.add-part-inputs input:focus { border-color: var(--accent); }
.add-part-inputs input.inp-name { flex: 1; min-width: 140px; }
.add-part-inputs input.inp-pn { width: 150px; }

/* MODAL */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.2s ease;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.parts-builder { margin-top: 4px; }
.parts-builder-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.parts-builder-row input { flex: 1; }
.parts-builder-row input.pb-pn { max-width: 160px; }
.remove-part-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 4px; flex-shrink: 0; }
.remove-part-btn:hover { color: #ff6b6b; }
.add-pb-row {
  background: none;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 6px 12px;
  margin-top: 4px;
  width: 100%;
  transition: border-color 0.15s, color 0.15s;
}
.add-pb-row:hover { border-color: var(--accent); color: var(--accent); }

.btn-primary { background: var(--accent); border: none; border-radius: 8px; color: #0c0e12; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 10px 20px; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: var(--border); border: none; border-radius: 8px; color: var(--text-dim); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 20px; transition: opacity 0.15s; }
.btn-secondary:hover { opacity: 0.8; }

/* FLOATING ADD FAN BUTTON */
.fab {
  background: var(--accent);
  color: #0c0e12;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 14px 22px;
  box-shadow: 0 4px 20px rgba(78,205,196,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(78,205,196,0.45); }
@media (max-width: 600px) { .fab { padding: 12px 18px; } }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}

.empty-state svg {
  width: 64px;
  height: 64px;
  color: var(--border);
  margin-bottom: 20px;
}

.empty-state h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-bottom: 8px;
}

.empty-state p { color: var(--text-dim); font-size: 14px; }

/* highlight matched text */
mark {
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 2px;
}

/* PART INDEX REVERSE MATCH CARD */
.reverse-match {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), transparent);
  border: 1px solid rgba(255,107,53,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease both;
}

.reverse-match-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--orange);
  margin-bottom: 8px;
  font-weight: 700;
}

.reverse-match h4 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 4px;
}

.reverse-match .rm-desc { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }

.reverse-match .rm-models { font-size: 13px; color: var(--accent); }

/* Responsive */
@media (max-width: 600px) {
  header { padding: 40px 0 24px; }
  header .stat-bar { gap: 20px; }
  .fan-header { padding: 16px; }
  .parts-table th, .parts-table td { padding: 10px 16px; }
  .product-link { padding: 10px 16px; }
}

/* COPY BUTTON */
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-dim);
  padding: 4px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  vertical-align: middle;
  margin-left: 2px;
}
.parts-table tr:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--accent); background: var(--accent-glow); }
.copy-btn.copied { color: #4ade80; opacity: 1; }

/* MODEL NUMBER EDIT BUTTON */
.model-edit-btn { opacity: 0; margin-left: 6px; }
.fan-header:hover .model-edit-btn { opacity: 1; }

/* DID YOU MEAN */
.did-you-mean-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}
.suggestion-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--accent);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 7px 16px;
  transition: background 0.15s, border-color 0.15s;
}
.suggestion-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
.suggestion-label { font-size: 13px; color: var(--text-dim); margin-top: 12px; margin-bottom: 4px; }

/* FAB GROUP */
.fab-group {
  position: fixed;
  bottom: 32px;
  right: 32px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  z-index: 50;
}
.fab-pdf {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-dim);
  border-radius: 50px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 11px 18px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: transform 0.15s, color 0.15s, border-color 0.15s;
}
.fab-pdf:hover { transform: translateY(-2px); color: var(--accent); border-color: var(--accent); }
@media (max-width: 600px) { .fab-group { bottom: 20px; right: 20px; } }

/* PRINT STYLES */
@media print {
  body::before { display: none; }
  .fab-group, .add-part-btn, .edit-btn, .copy-btn, .model-edit-btn,
  .modal-backdrop, .search-wrap, .search-hint { display: none !important; }
  #results { padding-bottom: 0; }
  .fan-card { break-inside: avoid; border: 1px solid #ccc; margin-bottom: 12px; }
  .fan-body { display: block !important; }
  .fan-header { background: #f5f5f5 !important; cursor: default; }
  .fan-name { color: #000; -webkit-text-fill-color: #000; }
  .fan-model-nums { color: #0078a0; }
  .parts-table th { color: #555; background: #eee; }
  .parts-table td { color: #000; border-top: 1px solid #ddd; }
  .part-number { color: #c0400a; }
  header h1 { -webkit-text-fill-color: #000; }
  .stat .num { -webkit-text-fill-color: #0078a0; }
  body { background: #fff !important; color: #000 !important; }
  .container { max-width: 100%; }
  .chevron { display: none; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="4" fill="var(--accent)"/>
        <path d="M18 2C18 2 22 10 22 14C22 16.2 20.2 18 18 18" stroke="var(--accent)" stroke-width="1.5" opacity="0.7"/>
        <path d="M34 18C34 18 26 22 22 22C19.8 22 18 20.2 18 18" stroke="var(--accent)" stroke-width="1.5" opacity="0.7"/>
        <path d="M18 34C18 34 14 26 14 22C14 19.8 15.8 18 18 18" stroke="var(--accent)" stroke-width="1.5" opacity="0.7"/>
        <path d="M2 18C2 18 10 14 14 14C16.2 14 18 15.8 18 18" stroke="var(--accent)" stroke-width="1.5" opacity="0.7"/>
      </svg>
      <span class="brand-text">Modern Forms &amp; WAC</span>
    </div>
    <h1>Fan Parts Lookup</h1>
    <p>Search by fan name, model number, or part number</p>
    <div class="stat-bar">
      <div class="stat"><div class="num" id="fan-count">0</div><div class="label">Fan Models</div></div>
      <div class="stat"><div class="num" id="part-count">0</div><div class="label">Parts Indexed</div></div>
    </div>
  </header>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="e.g. Chill 2, FR-W2605, RPL-CAN-CYL..." autofocus>
  </div>
  <div class="search-hint">Search across <kbd>fan names</kbd> <kbd>model numbers</kbd> <kbd>part numbers</kbd></div>

  <div id="results"></div>
</div>

<!-- Floating Action Buttons -->
<div class="fab-group">
  <button class="fab-pdf" onclick="exportToPDF()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Export PDF
  </button>
  <button class="fab" onclick="openAddFanModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Fan
  </button>
</div>

<!-- Add New Fan Modal -->
<div class="modal-backdrop" id="fan-modal" onclick="if(event.target===this)closeAddFanModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>Add New Fan</h2>
      <button class="modal-close" onclick="closeAddFanModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="nf-name">Fan Name *</label>

const fans = DATA.fans;
function buildPartIndex(fans) {
  const map = {};
  fans.forEach(fan => {
    fan.parts.forEach(part => {
      if (!part.partNumber) return;
      if (!map[part.partNumber]) {
        map[part.partNumber] = { partNumber: part.partNumber, description: part.name, usedInFans: [], modelNumbers: [] };
      }
      if (!map[part.partNumber].usedInFans.includes(fan.name)) {
        map[part.partNumber].usedInFans.push(fan.name);
        map[part.partNumber].modelNumbers.push(...fan.modelNumbers);
      }
    });
  });
  return Object.values(map).map(p => ({ partNumber: p.partNumber, description: p.description, usedIn: p.usedInFans.join(', '), modelNumbers: p.modelNumbers }));
}
const partIndex = buildPartIndex(fans);

// Apply all stored data to in-memory fans array
(function applyStoredData() {
  // 1. Apply part-number edits
  const edits = loadEdits();
  fans.forEach(fan => {
    fan.parts.forEach(p => {
      const key = fan.name + '|' + p.name;
      if (edits[key] !== undefined) p.partNumber = edits[key];
    });
  });
  // 2. Apply added parts
  const added = loadAdded();
  fans.forEach(fan => {
    const extra = added[fan.name];
    if (extra && extra.length) fan.parts.push(...extra);
  });
  // 3. Append custom fans
  const custom = loadCustomFans();
  fans.push(...custom);
  // 4. Apply model number edits
  const modelEdits = loadModelEdits();
  fans.forEach(fan => {
    if (modelEdits[fan.name] !== undefined) fan.modelNumbers = modelEdits[fan.name];
  });
})();

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightMatch(text, query) {
  if (!query || !text) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function searchFans(query) {
  const q = query.toLowerCase().trim();
  if (!q) return { fanResults: [], partResults: [] };

  // Strip the last hyphen-segment from a string (e.g. "f-003-gr" → "f-003")
  // Used so typing the wrong color suffix still finds the right fan
  function stripLast(s) {
    const i = s.lastIndexOf('-');
    return i > 0 ? s.substring(0, i) : s;
  }

  // Build a stripped version of the query for base matching
  const qBase = stripLast(q);

  // Search fans by name and model number
  const fanResults = fans.filter(fan => {
    if (fan.name.toLowerCase().includes(q)) return true;
    if (fan.modelNumbers.some(mn => {
      const mnl = mn.toLowerCase();
      if (mnl.includes(q) || q.startsWith(mnl)) return true;
      // If query has a color/suffix segment that doesn't match, try matching
      // by the base (everything before the last hyphen segment)
      const mnBase = stripLast(mnl);
      if (qBase && qBase !== q && (mnBase === qBase || mnl.includes(qBase))) return true;
      return false;
    })) return true;
    // Also match if any part number matches
    if (fan.parts.some(p => p.partNumber.toLowerCase().includes(q))) return true;
    return false;
  });

  // Search part index for reverse lookup
  const partResults = partIndex.filter(p => {
    return p.partNumber.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
  });

  return { fanResults, partResults };
}

function copyToClipboard(text, btn) {
  const doFeedback = () => {
    if (!btn) return;
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(doFeedback).catch(() => {
      legacyCopy(text); doFeedback();
    });
  } else {
    legacyCopy(text); doFeedback();
  }
}
function legacyCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

// ── Fuzzy Search ──────────────────────────────────────────────────
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function getFuzzySuggestions(query) {
  const q = query.toLowerCase().trim();
  const maxDist = Math.max(2, Math.floor(q.length * 0.35));
  const seen = new Set();
  const results = [];
  fans.forEach(fan => {
    [fan.name, ...fan.modelNumbers].forEach(label => {
      if (seen.has(label)) return;
      const dist = levenshtein(q, label.toLowerCase());
      if (dist <= maxDist) { seen.add(label); results.push({ label, dist }); }
    });
  });
  return results.sort((a, b) => a.dist - b.dist).slice(0, 5).map(r => r.label);
}

// ── PDF Export ────────────────────────────────────────────────────
function exportToPDF() {
  const prev = searchEl.value;
  let html = '';
  fans.forEach((fan, i) => {
    html += `
    <div class="fan-card open" style="animation:none">
      <div class="fan-header" style="cursor:default">
        <div class="fan-header-left">
          <div class="fan-name">${escapeHtml(fan.name)}</div>
          <div class="fan-model-nums">${fan.modelNumbers.map(m => escapeHtml(m)).join(' · ')}</div>
        </div>
        <div class="fan-header-right">
          <span class="parts-badge">${fan.parts.length} parts</span>
        </div>
      </div>
      <div class="fan-body">
        ${fan.productUrl ? `<a class="product-link" href="${escapeHtml(fan.productUrl)}" target="_blank">${escapeHtml(fan.productUrl)}</a>` : ''}
        <table class="parts-table">
          <thead><tr><th>Part Name</th><th>Part Number</th></tr></thead>
          <tbody>${fan.parts.map(p => `<tr>
            <td class="part-name">${escapeHtml(p.name)}</td>
            <td>${p.partNumber ? `<span class="part-number">${escapeHtml(p.partNumber)}</span>` : '<span class="no-pn">N/A</span>'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
  });
  resultsEl.innerHTML = html;
  setTimeout(() => {
    window.print();
    setTimeout(() => renderResults(prev), 800);
  }, 150);
}

function renderResults(query) {
  const q = query.trim();
  if (!q) {
    resultsEl.innerHTML = '';
    return;
  }

  const { fanResults, partResults } = searchFans(q);

  if (fanResults.length === 0 && partResults.length === 0) {
    const suggestions = getFuzzySuggestions(q);
    const suggestHtml = suggestions.length > 0
      ? `<p class="suggestion-label">Did you mean?</p>
         <div class="did-you-mean-suggestions">
           ${suggestions.map(s => `<button class="suggestion-btn" onclick="searchEl.value=${JSON.stringify(s)};renderResults(${JSON.stringify(s)})">${escapeHtml(s)}</button>`).join('')}
         </div>`
      : `<p>Try a different fan name, model number, or part number</p>`;
    resultsEl.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <h3>No results found</h3>
        ${suggestHtml}
      </div>`;
    return;
  }

  let html = '';

  // Reverse part matches
  partResults.forEach((p, i) => {
    html += `
    <div class="reverse-match" style="animation-delay:${i * 0.05}s">
      <div class="reverse-match-title">Part Number Match</div>
      <h4>${highlightMatch(p.partNumber, q)}</h4>
      <div class="rm-desc">${highlightMatch(p.description, q)}</div>
      <div class="rm-models">Used in: ${escapeHtml(p.usedIn)}</div>
    </div>`;
  });

  // Store for edit callbacks
  _lastFanResults = fanResults;

  // Fan cards
  fanResults.forEach((fan, i) => {
    const open = fanResults.length === 1 ? ' open' : '';
    html += `
    <div class="fan-card${open}" style="animation-delay:${(partResults.length + i) * 0.05}s">
      <div class="fan-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="fan-header-left">
          <div class="fan-name">${highlightMatch(fan.name, q)}</div>
          <div class="fan-model-nums" id="mn-cell-${i}">${fan.modelNumbers.map(m => highlightMatch(m, q)).join(' &middot; ')}<button class="edit-btn model-edit-btn" onclick="event.stopPropagation();startEditModel(${i})" title="Edit model numbers"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div>
        </div>
        <div class="fan-header-right">
          <span class="parts-badge">${fan.parts.length} parts</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="fan-body">
        ${fan.productUrl ? `<a class="product-link" href="${escapeHtml(fan.productUrl)}" target="_blank" rel="noopener">View Product Page <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : ''}
        <table class="parts-table">
          <thead><tr><th>Part Name</th><th>Part Number</th></tr></thead>
          <tbody id="parts-tbody-${i}">
            ${fan.parts.map((p, pi) => {
              const pnDisplay = p.partNumber
                ? `<span class="part-number">${highlightMatch(p.partNumber, q)}</span><button class="copy-btn" onclick="copyToClipboard(${JSON.stringify(p.partNumber)},this)" title="Copy part number"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>`
                : '<span class="no-pn">N/A</span>';
              return `
              <tr>
                <td class="part-name">${highlightMatch(p.name, q)}</td>
                <td id="pn-cell-${i}-${pi}">
                  ${pnDisplay}
                  <button class="edit-btn" onclick="startEdit(${i},${pi})" title="Edit part number">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <button class="add-part-btn" onclick="showAddPartRow(${i})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Part
        </button>
      </div>
    </div>`;
  });

  resultsEl.innerHTML = html;
}

// Debounced search
let timer;
searchEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(searchEl.value), 150);
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
  }
});
</script>
