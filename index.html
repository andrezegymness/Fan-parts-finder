<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Forms Fan Parts Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0e12;
  --surface: #15181f;
  --surface-hover: #1c2029;
  --border: #2a2e38;
  --text: #e8eaed;
  --text-dim: #8b8f9a;
  --accent: #4ecdc4;
  --accent-glow: rgba(78, 205, 196, 0.15);
  --accent-dim: #3ba89f;
  --orange: #ff6b35;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 60px 0 40px;
  text-align: center;
}

header .brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

header .brand svg {
  width: 36px;
  height: 36px;
}

header .brand-text {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 600;
  line-height: 1.1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: var(--text-dim);
  font-size: 16px;
  font-weight: 300;
}

header .stat-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
}

header .stat {
  text-align: center;
}

header .stat .num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

header .stat .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* SEARCH */
.search-wrap {
  position: relative;
  max-width: 600px;
  margin: 0 auto 16px;
}

.search-wrap svg {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  color: var(--text-dim);
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 18px 20px 18px 52px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#search::placeholder { color: var(--text-dim); }

#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.search-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 40px;
}

.search-hint kbd {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
}

/* RESULTS */
#results {
  padding-bottom: 80px;
}

.fan-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  animation: fadeUp 0.35s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fan-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}

.fan-header:hover { background: var(--surface-hover); }

.fan-header-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.fan-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
}

.fan-model-nums {
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.fan-header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.parts-badge {
  background: var(--accent-glow);
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.chevron {
  width: 20px;
  height: 20px;
  color: var(--text-dim);
  transition: transform 0.25s ease;
}

.fan-card.open .chevron { transform: rotate(180deg); }

.fan-body {
  display: none;
  border-top: 1px solid var(--border);
}

.fan-card.open .fan-body { display: block; }

.product-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  transition: color 0.15s;
}

.product-link:hover { color: var(--orange); }

.parts-table {
  width: 100%;
  border-collapse: collapse;
}

.parts-table th {
  text-align: left;
  padding: 10px 24px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  background: rgba(0,0,0,0.2);
  font-weight: 500;
}

.parts-table td {
  padding: 12px 24px;
  font-size: 14px;
  border-top: 1px solid var(--border);
}

.parts-table tr:hover td { background: var(--surface-hover); }

.part-name { font-weight: 500; }

.part-number {
  font-family: 'DM Sans', monospace;
  color: var(--orange);
  font-size: 13px;
  font-weight: 500;
}

.no-pn { color: var(--text-dim); font-style: italic; font-size: 12px; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}

.empty-state svg {
  width: 64px;
  height: 64px;
  color: var(--border);
  margin-bottom: 20px;
}

.empty-state h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-bottom: 8px;
}

.empty-state p { color: var(--text-dim); font-size: 14px; }

/* highlight matched text */
mark {
  background: var(--accent-glow);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 2px;
}

/* PART INDEX REVERSE MATCH CARD */
.reverse-match {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), transparent);
  border: 1px solid rgba(255,107,53,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
  animation: fadeUp 0.3s ease both;
}

.reverse-match-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--orange);
  margin-bottom: 8px;
  font-weight: 700;
}

.reverse-match h4 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 4px;
}

.reverse-match .rm-desc { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }

.reverse-match .rm-models { font-size: 13px; color: var(--accent); }

/* Responsive */
@media (max-width: 600px) {
  header { padding: 40px 0 24px; }
  header .stat-bar { gap: 20px; }
  .fan-header { padding: 16px; }
  .parts-table th, .parts-table td { padding: 10px 16px; }
  .product-link { padding: 10px 16px; }
}
</style>
</head>

const fans = DATA.fans;
const partIndex = DATA.partIndex;

document.getElementById('fan-count').textContent = fans.length;
document.getElementById('part-count').textContent = partIndex.length;

const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightMatch(text, query) {
  if (!query || !text) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function searchFans(query) {
  const q = query.toLowerCase().trim();
  if (!q) return { fanResults: [], partResults: [] };

  // Search fans by name and model number
  const fanResults = fans.filter(fan => {
    if (fan.name.toLowerCase().includes(q)) return true;
    if (fan.modelNumbers.some(mn => mn.toLowerCase().includes(q))) return true;
    // Also match if any part number matches
    if (fan.parts.some(p => p.partNumber.toLowerCase().includes(q))) return true;
    return false;
  });

  // Search part index for reverse lookup
  const partResults = partIndex.filter(p => {
    return p.partNumber.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
  });

  return { fanResults, partResults };
}

function renderResults(query) {
  const q = query.trim();
  if (!q) {
    resultsEl.innerHTML = '';
    return;
  }

  const { fanResults, partResults } = searchFans(q);

  if (fanResults.length === 0 && partResults.length === 0) {
    resultsEl.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <h3>No results found</h3>
        <p>Try a different fan name, model number, or part number</p>
      </div>`;
    return;
  }

  let html = '';

  // Reverse part matches
  partResults.forEach((p, i) => {
    html += `
    <div class="reverse-match" style="animation-delay:${i * 0.05}s">
      <div class="reverse-match-title">Part Number Match</div>
      <h4>${highlightMatch(p.partNumber, q)}</h4>
      <div class="rm-desc">${highlightMatch(p.description, q)}</div>
      <div class="rm-models">Used in: ${escapeHtml(p.usedIn)}</div>
    </div>`;
  });

  // Fan cards
  fanResults.forEach((fan, i) => {
    const open = fanResults.length === 1 ? ' open' : '';
    html += `
    <div class="fan-card${open}" style="animation-delay:${(partResults.length + i) * 0.05}s">
      <div class="fan-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="fan-header-left">
          <div class="fan-name">${highlightMatch(fan.name, q)}</div>
          <div class="fan-model-nums">${fan.modelNumbers.map(m => highlightMatch(m, q)).join(' &middot; ')}</div>
        </div>
        <div class="fan-header-right">
          <span class="parts-badge">${fan.parts.length} parts</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="fan-body">
        ${fan.productUrl ? `<a class="product-link" href="${escapeHtml(fan.productUrl)}" target="_blank" rel="noopener">View on ModernForms.com <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : ''}
        <table class="parts-table">
          <thead><tr><th>Part Name</th><th>Part Number</th></tr></thead>
          <tbody>
            ${fan.parts.map(p => `
              <tr>
                <td class="part-name">${highlightMatch(p.name, q)}</td>
                <td>${p.partNumber ? `<span class="part-number">${highlightMatch(p.partNumber, q)}</span>` : '<span class="no-pn">N/A</span>'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });

  resultsEl.innerHTML = html;
}

// Debounced search
let timer;
searchEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => renderResults(searchEl.value), 150);
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
  }
});
